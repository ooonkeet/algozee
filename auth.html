<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algozee — Login / Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="auth-wrapper">

    <!-- Logo -->
    <a href="index.html" class="auth-logo">
      <div class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2" ry="2"></rect>
          <path d="M12 2v9"></path><path d="M8 5h8"></path>
          <circle cx="8" cy="16" r="1" fill="#fff"></circle>
          <circle cx="16" cy="16" r="1" fill="#fff"></circle>
        </svg>
      </div>
      <span class="auth-logo-text">Algozee</span>
    </a>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="showTab('login')">Login</button>
        <button class="auth-tab"        id="tab-register" onclick="showTab('register')">Register</button>
      </div>

      <!-- Error / Success banner -->
      <div class="auth-alert" id="auth-alert" style="display:none;"></div>

      <!-- ── LOGIN FORM ── -->
      <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label for="login-password">Password</label>
          <div class="input-wrapper">
            <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" onclick="togglePw('login-password', this)">Show</button>
          </div>
        </div>
        <button type="submit" class="auth-btn" id="btn-login">
          <span class="btn-label">Sign In</span>
          <span class="btn-spinner" style="display:none;"></span>
        </button>
        <p class="auth-note">No account? <a href="#" onclick="showTab('register');return false;">Create one →</a></p>
      </form>

      <!-- ── REGISTER FORM ── -->
      <form id="form-register" class="auth-form" style="display:none;" onsubmit="handleRegister(event)">
        <div class="auth-field">
          <label for="reg-username">Username</label>
          <input id="reg-username" type="text" placeholder="coder123" minlength="3" maxlength="30" required />
        </div>
        <div class="auth-field">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label for="reg-password">Password</label>
          <div class="input-wrapper">
            <input id="reg-password" type="password" placeholder="Min 6 chars, A-Z, a-z, 0-9"
              autocomplete="new-password" required />
            <button type="button" class="toggle-pw" onclick="togglePw('reg-password', this)">Show</button>
          </div>
        </div>
        <button type="submit" class="auth-btn" id="btn-register">
          <span class="btn-label">Create Account</span>
          <span class="btn-spinner" style="display:none;"></span>
        </button>
        <p class="auth-note">Already have an account? <a href="#" onclick="showTab('login');return false;">Sign in →</a></p>
      </form>

    </div><!-- /auth-card -->

    <p class="auth-footer">
      Continue without an account — <a href="index.html">browse as guest</a>
    </p>

  </div><!-- /auth-wrapper -->

  <!-- API client (no app.js needed here) -->
  <script src="algozee-api.js"></script>
  <script>
    // ── Redirect if already logged in ──────────────────────────────────────────
    if (window.AlgozeeSession && window.AlgozeeSession.isLoggedIn()) {
      window.location.href = 'index.html';
    }

    // ── Tab switching ──────────────────────────────────────────────────────────
    function showTab(tab) {
      document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
      document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      hideAlert();
    }

    // ── Alert helpers ─────────────────────────────────────────────────────────
    function showAlert(msg, type = 'error') {
      const el = document.getElementById('auth-alert');
      el.textContent = msg;
      el.className = `auth-alert ${type}`;
      el.style.display = '';
    }
    function hideAlert() {
      document.getElementById('auth-alert').style.display = 'none';
    }

    // ── Button loading helpers ─────────────────────────────────────────────────
    function setLoading(btnId, loading) {
      const btn     = document.getElementById(btnId);
      const label   = btn.querySelector('.btn-label');
      const spinner = btn.querySelector('.btn-spinner');
      btn.disabled         = loading;
      label.style.display  = loading ? 'none' : '';
      spinner.style.display = loading ? '' : 'none';
    }

    // ── Password visibility toggle ─────────────────────────────────────────────
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    }

    // ── Login ──────────────────────────────────────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      hideAlert();
      setLoading('btn-login', true);

      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      try {
        await window.AlgozeeAPI.Auth.login(email, password);
        showAlert('Logged in! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      } catch (err) {
        showAlert(err.message || 'Login failed. Check your credentials.');
        setLoading('btn-login', false);
      }
    }

    // ── Register ───────────────────────────────────────────────────────────────
    async function handleRegister(e) {
      e.preventDefault();
      hideAlert();
      setLoading('btn-register', true);

      const username = document.getElementById('reg-username').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;

      if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
        showAlert('Password must have uppercase, lowercase, and a number.');
        setLoading('btn-register', false);
        return;
      }

      try {
        await window.AlgozeeAPI.Auth.register(username, email, password);
        showAlert('Account created! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      } catch (err) {
        showAlert(err.message || 'Registration failed. Try a different email/username.');
        setLoading('btn-register', false);
      }
    }
  </script>
</body>
</html>
